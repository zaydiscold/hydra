name: Electron package smoke

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  # `npm test`'s pretest runs `prisma db push` / `prisma generate` which read
  # DATABASE_URL from the schema's datasource. Without these set the test
  # suite fails before any test runs.
  DATABASE_URL: "file:./prisma/ci.db"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HYDRA_DATA_DIR: ".hydra-ci-data"
  JWT_SECRET: "ci-test-secret-32-characters-long"

jobs:
  package-smoke:
    name: ${{ matrix.os }} ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            build_target: darwin-arm64
            target: --mac zip --arm64
          - os: macos-15-intel
            build_target: darwin-x64
            target: --mac zip --x64
          - os: windows-latest
            build_target: win32-x64
            target: --win nsis --x64
          - os: ubuntu-latest
            build_target: linux-x64
            target: --linux AppImage --x64

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      # `npm test` includes test:gzip-middleware which reads dist/assets, so
      # the renderer build has to land before tests — matches CI and release.yml.
      - run: npm run build
      - name: npm test
        id: tests
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.log
      - name: Surface npm test failure
        if: steps.tests.outcome == 'failure'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ -n "${PR_NUMBER:-}" ] && [ -f test-output.log ]; then
            BODY_FILE=$(mktemp)
            {
              echo "**npm test failed** on \`${{ matrix.os }}\` (\`${{ matrix.build_target }}\`)"
              echo ""
              echo '<details><summary>tail -200 test-output.log</summary>'
              echo ''
              echo '```'
              tail -200 test-output.log
              echo '```'
              echo '</details>'
            } > "$BODY_FILE"
            PAYLOAD=$(jq -n --rawfile b "$BODY_FILE" '{body: $b}')
            curl -sS -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              --data "$PAYLOAD" || true
          fi
          exit 1
      - run: npm run gate
      - run: npm run build
      - run: npm run electron:prepare
        env:
          HYDRA_BUILD_TARGET: ${{ matrix.build_target }}
      - run: npx electron-builder ${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HYDRA_SKIP_NOTARIZE: '1'
      - run: npm run electron:smoke
        env:
          HYDRA_BUILD_TARGET: ${{ matrix.build_target }}