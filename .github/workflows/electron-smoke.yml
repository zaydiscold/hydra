name: Electron package smoke

on:
  pull_request:
  workflow_dispatch:

env:
  # `npm test`'s pretest runs `prisma db push` / `prisma generate` which read
  # DATABASE_URL from the schema's datasource. Without these set the test
  # suite fails before any test runs.
  DATABASE_URL: "file:./prisma/ci.db"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HYDRA_DATA_DIR: ".hydra-ci-data"
  JWT_SECRET: "ci-test-secret-32-characters-long"

jobs:
  package-smoke:
    name: ${{ matrix.os }} ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            build_target: darwin-arm64
            target: --mac zip --arm64
          - os: macos-15-intel
            build_target: darwin-x64
            target: --mac zip --x64
          - os: windows-latest
            build_target: win32-x64
            target: --win nsis --x64
          - os: ubuntu-latest
            build_target: linux-x64
            target: --linux AppImage --x64

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - name: npm test
        id: tests
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.log
      - name: Surface npm test failure
        if: steps.tests.outcome == 'failure'
        shell: bash
        run: |
          {
            echo "## npm test failure on ${{ matrix.os }} (${{ matrix.build_target }})"
            echo ""
            echo "<details><summary>tail -300 test-output.log</summary>"
            echo ""
            echo '```'
            tail -300 test-output.log || echo "(no test-output.log)"
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
      - run: npm run gate
      - run: npm run build
      - run: npm run electron:prepare
        env:
          HYDRA_BUILD_TARGET: ${{ matrix.build_target }}
      - run: npx electron-builder ${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HYDRA_SKIP_NOTARIZE: '1'
      - run: npm run electron:smoke
        env:
          HYDRA_BUILD_TARGET: ${{ matrix.build_target }}