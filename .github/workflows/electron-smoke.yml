name: Electron package smoke

on:
  pull_request:
    paths:
      - 'electron/**'
      - 'server/**'
      - 'prisma/**'
      - 'scripts/**'
      - 'electron-builder.yml'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/electron-smoke.yml'
  workflow_dispatch:

jobs:
  package-smoke:
    name: ${{ matrix.os }} ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: --mac dmg --arm64
          - os: windows-latest
            target: --win nsis --x64
          - os: ubuntu-latest
            target: --linux AppImage --x64

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - run: npm run electron:prepare
      - run: npx electron-builder ${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: npm run electron:smoke
