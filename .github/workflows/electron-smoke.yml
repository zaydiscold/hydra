name: Electron package smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  package-smoke:
    name: ${{ matrix.os }} ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            build_target: darwin-arm64
            target: --mac zip --arm64
          - os: macos-15-intel
            build_target: darwin-x64
            target: --mac zip --x64
          - os: windows-latest
            build_target: win32-x64
            target: --win nsis --x64
          - os: ubuntu-latest
            build_target: linux-x64
            target: --linux AppImage --x64

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run gate
      - run: npm run build
      - run: npm run electron:prepare
        env:
          HYDRA_BUILD_TARGET: ${{ matrix.build_target }}
      - run: npx electron-builder ${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HYDRA_SKIP_NOTARIZE: '1'
      - run: npm run electron:smoke
        env:
          HYDRA_BUILD_TARGET: ${{ matrix.build_target }}
