name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  verify:
    name: lint, test, gate
    runs-on: ubuntu-22.04
    env:
      DATABASE_URL: "file:./prisma/ci.db"
      HYDRA_DATA_DIR: ".hydra-ci-data"
      JWT_SECRET: "ci-test-secret-32-characters-long"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run gate
      - run: npm run build
