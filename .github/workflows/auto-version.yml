name: Auto-version

# Every push to master that's NOT itself a release-bump commit:
#   1. Read package.json version
#   2. Check if a tag for that version already exists on origin
#   3. If yes (someone already shipped this version), bump patch by default
#      or bump minor/major when the triggering commit says `[bump:minor]`
#      or `[bump:major]`
#   4. Write the new version to package.json + package-lock.json
#   5. Commit with `[skip-bump]` tag so this workflow doesn't recurse
#   6. Push the commit + push the matching `vX.Y.Z` tag
#   7. Dispatch release.yml on that tag ref
#
# The explicit workflow dispatch is intentional. Tags pushed by the default
# GITHUB_TOKEN do not reliably trigger another workflow run, so auto-version
# calls release.yml directly on the tag ref after pushing it.
#
# Escape hatch: include `[skip-bump]` in any commit message to skip
# auto-versioning. The bump commit itself always carries this tag so
# it doesn't trigger another bump.
#
# Release sizing:
#   - default / `[bump:patch]`: bug fixes, docs, small hardening
#   - `[bump:minor]`: coherent user-visible feature/performance release
#   - `[bump:major]`: breaking local data/API/operator-contract change

on:
  push:
    branches:
      - master

permissions:
  contents: write
  actions: write

concurrency:
  group: auto-version-master
  cancel-in-progress: false

jobs:
  bump-and-tag:
    runs-on: ubuntu-22.04
    # Skip when the commit that triggered this run is already a bump
    # commit (carries [skip-bump]) or a Merge-of-a-bump-PR.
    if: |
      !contains(github.event.head_commit.message, '[skip-bump]') &&
      !contains(github.event.head_commit.message, 'chore(release):')
    steps:
      - name: Checkout master with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Determine next version
        id: nextver
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          current=$(node -p "require('./package.json').version")
          echo "current=$current"

          # If a tag for the CURRENT package.json version doesn't exist,
          # ship that one as-is (catches the case where someone manually
          # bumped package.json but skipped the tag — exactly v1.0.8's
          # original failure mode).
          if ! git rev-parse "v$current" >/dev/null 2>&1 \
             && ! git ls-remote --tags origin "v$current" | grep -q "v$current"; then
            echo "next=$current" >> "$GITHUB_OUTPUT"
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
            echo "Catching up: package.json is at $current but no tag exists. Tagging current."
            exit 0
          fi

          bump="patch"
          if [[ "$COMMIT_MESSAGE" == *"[bump:major]"* ]]; then
            bump="major"
          elif [[ "$COMMIT_MESSAGE" == *"[bump:minor]"* ]]; then
            bump="minor"
          elif [[ "$COMMIT_MESSAGE" == *"[bump:patch]"* ]]; then
            bump="patch"
          fi

          IFS=. read -r major minor patch <<< "$current"
          case "$bump" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unknown bump type: $bump" >&2
              exit 1
              ;;
          esac
          next="${major}.${minor}.${patch}"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "needs_bump=true" >> "$GITHUB_OUTPUT"
          echo "Bumping $current -> $next ($bump)"

      - name: Write new version into package.json
        if: steps.nextver.outputs.needs_bump == 'true'
        run: |
          npm version "${{ steps.nextver.outputs.next }}" \
            --no-git-tag-version \
            --allow-same-version
          git config user.name 'hydra-bot'
          git config user.email 'hydra-bot@users.noreply.github.com'
          git add package.json package-lock.json
          git commit -m "chore(release): v${{ steps.nextver.outputs.next }} [skip-bump]"
          git push origin master

      - name: Tag and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NEW="v${{ steps.nextver.outputs.next }}"
          git tag -a "$NEW" -m "Release $NEW"
          git push origin "$NEW"
          gh workflow run release.yml --ref "$NEW"
          echo "Pushed tag $NEW and dispatched release.yml on $NEW."
